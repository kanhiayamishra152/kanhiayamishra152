name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Verify Flutter installation
        run: flutter doctor -v
      
      - name: Create key.properties (if needed for signing)
        run: |
          echo "storePassword=android" >> android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=../app/upload-keystore.jks" >> android/key.properties
        continue-on-error: true
      
      - name: Build Android APK (Release)
        run: flutter build apk --release --split-per-abi
      
      - name: Build universal APK (optional - single APK for all architectures)
        run: flutter build apk --release
      
      - name: Upload APK Artifact (armeabi-v7a)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-armeabi-v7a-release
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30
      
      - name: Upload APK Artifact (arm64-v8a)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-arm64-v8a-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
      
      - name: Upload APK Artifact (x86_64)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-x86_64-release
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30
      
      - name: Upload Universal APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-universal-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      - name: Create Release (Optional - for tagged commits)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
